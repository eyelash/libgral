name: CI
on: push
jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v2
    - if: runner.os == 'Linux'
      run: sudo apt-get -y install libgtk-3-dev libpulse-dev
    - run: cmake -S . -B build
    - run: cmake --build build
