name: CI
on: push
jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install libgtk-3-dev libpipewire-0.3-dev
    - run: cmake -S . -B build -D BUILD_DEMOS=YES
    - run: cmake --build build
